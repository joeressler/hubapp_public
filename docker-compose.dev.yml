services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_VOICE_URL=http://localhost:8081/voice
      - WDS_SOCKET_PORT=0
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=false
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    user: "1001:1001"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app/backend
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PWD=${MYSQL_PWD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - RECAPTCHA_PUBLIC_KEY=${RECAPTCHA_PUBLIC_KEY}
      - RECAPTCHA_PRIVATE_KEY=${RECAPTCHA_PRIVATE_KEY}
      - VERIFY_URL=${VERIFY_URL}
      - PASSWORD_PIN=${PASSWORD_PIN}
      - SENTRY_DSN=${SENTRY_DSN}
    volumes:
      - ./backend:/app/backend
      - vosk-models:/app/models
      - ./backend/utils/vector_db/storage:/app/backend/utils/vector_db/storage
    env_file:
      - path: .env
        required: false
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=8080", "--debug"]
    networks:
      - app-network
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  voice:
    build:
      context: ./voice
      dockerfile: Dockerfile
    volumes:
      - ./voice:/app
      - voice_audio:/app/audio
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8081",
        "--reload",
      ]
    networks:
      - app-network
    ports:
      - "8081:8081"
    environment:
      - BACKEND_URL=http://backend:8080
      - AUDIO_DIR=/app/audio
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/voice/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  vosk-models:
  voice_audio: