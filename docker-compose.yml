services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    command: ["node", "server.js"]
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PUBLIC_URL=https://www.josepharessler.com
    user: "1001:1001"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app/backend
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PWD=${MYSQL_PWD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - RECAPTCHA_PUBLIC_KEY=${RECAPTCHA_PUBLIC_KEY}
      - RECAPTCHA_PRIVATE_KEY=${RECAPTCHA_PRIVATE_KEY}
      - VERIFY_URL=${VERIFY_URL}
      - PASSWORD_PIN=${PASSWORD_PIN}
      - SENTRY_DSN=${SENTRY_DSN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app/backend
      - vosk-models:/app/models
      - ./backend/utils/vector_db/storage:/app/backend/utils/vector_db/storage
    command: ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "app:app"]
    networks:
      - app-network
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  voice:
    build:
      context: ./voice
      dockerfile: Dockerfile
    volumes:
      - ./voice:/app
      - voice_audio:/app/audio
    networks:
      - app-network
    ports:
      - "8081:8081"
    environment:
      - BACKEND_URL=http://backend:8080
      - AUDIO_DIR=/app/audio
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/voice/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  vosk-models:
  voice_audio: