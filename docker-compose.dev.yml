services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_VOICE_URL=http://localhost:8081/voice
      - WDS_SOCKET_PORT=0
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=false
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
    user: "1001:1001"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONPATH=/app/backend
      - MYSQL_HOST=${MYSQL_HOST}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PWD=${MYSQL_PWD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - RECAPTCHA_PUBLIC_KEY=${RECAPTCHA_PUBLIC_KEY}
      - RECAPTCHA_PRIVATE_KEY=${RECAPTCHA_PRIVATE_KEY}
      - VERIFY_URL=${VERIFY_URL}
      - PASSWORD_PIN=${PASSWORD_PIN}
      - SENTRY_DSN=${SENTRY_DSN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPELL_ECS_URL=http://spell-ecs:8082
    volumes:
      - ./backend:/app/backend
      - vosk-models:/app/models
      - ./backend/utils/vector_db/storage:/app/backend/utils/vector_db/storage
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=8080", "--debug"]
    networks:
      - app-network
    depends_on:
      spell-ecs:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  voice:
    build:
      context: ./voice
      dockerfile: Dockerfile
    volumes:
      - ./voice:/app
      - voice_audio:/app/audio
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8081",
        "--reload",
      ]
    networks:
      - app-network
    ports:
      - "8081:8081"
    environment:
      - BACKEND_URL=http://backend:8080
      - AUDIO_DIR=/app/audio
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/voice/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  spell-ecs:
    build:
      context: ./microservice
      dockerfile: Dockerfile
    volumes:
      - ./microservice:/app
      - granite_models:/app/models
    command:
      [
        "gunicorn",
        "config.wsgi:application",
        "--bind",
        "0.0.0.0:8082",
        "--workers",
        "1",
        "--threads",
        "2",
        "--timeout",
        "300",
        "--reload",
      ]
    networks:
      - app-network
    environment:
      - HF_HOME=/app/models
      - GRANITE_MODEL_REPO=ibm-granite/granite-4.1-3b-GGUF
      - GRANITE_MODEL_FILE=*Q4_K_M.gguf
      - GRANITE_N_CTX=4096
      - GRANITE_N_GPU_LAYERS=0
      - GRANITE_MAX_TOKENS=1024
      - DJANGO_DEBUG=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules:
  vosk-models:
  voice_audio:
  granite_models: